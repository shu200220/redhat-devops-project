<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubham Tanwar | Cloud & Data Professional</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-green: #34d399;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 30px;
            margin-bottom: 40px;
        }
        h1 {
            color: var(--accent);
            font-size: 3em;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        .contact-info {
            color: var(--text-muted);
            font-size: 1.1em;
        }
        .contact-info span {
            margin: 0 10px;
        }
        h2 {
            color: var(--accent-green);
            font-size: 1.8em;
            margin-top: 0;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }
        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .skill-category h3 {
            color: var(--accent);
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        ul {
            padding-left: 20px;
            margin: 0;
            color: var(--text-muted);
        }
        li {
            margin-bottom: 8px;
        }
        .project {
            margin-bottom: 25px;
        }
        .project h3 {
            color: var(--accent);
            margin: 0 0 5px 0;
            font-size: 1.4em;
        }
        .project-meta {
            font-size: 0.9em;
            color: var(--accent-green);
            margin-bottom: 15px;
            font-family: monospace;
        }
        .education-item, .cert-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .education-title {
            font-weight: bold;
            color: var(--accent);
        }
